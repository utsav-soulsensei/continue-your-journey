<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoulSensei — Claim Your Free Workshops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app fade-in">
    <div class="brand">
      <img class="brand__logo" src="Icon.svg" alt="SoulSensei" />
    </div>

    <h1 class="headline" style="font-size:clamp(30px,8vw,38px)">Claim your<br />free workshops</h1>
    <p class="lede">Just a few details and your seat for the<br />5 LIVE Workshops is reserved.</p>

    <form id="leadForm" class="card" novalidate>
      <div class="field" data-field="name">
        <label for="name">Full Name</label>
        <input id="name" name="name" type="text" autocomplete="name" placeholder="Your name" required />
        <span class="error">Please enter your name.</span>
      </div>

      <div class="field" data-field="email">
        <label for="email">Email Address</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
        <span class="error">Please enter a valid email address.</span>
      </div>

      <div class="field" data-field="phone">
        <label for="phone">Phone Number</label>
        <div class="phone-row">
          <input id="cc" name="cc" class="cc" type="tel" inputmode="tel" autocomplete="tel-country-code" value="+91" aria-label="Country code" />
          <input id="phone" name="phone" class="phone-num" type="tel" autocomplete="tel-national" inputmode="numeric" placeholder="Mobile number" required />
        </div>
        <span class="error">Please enter a valid phone number.</span>
      </div>

      <button class="btn" type="submit" id="submitBtn">Reserve My Seat</button>
      <p class="note">We'll send your workshop access to your email and phone.</p>
    </form>
  </main>

  <script src="app.js"></script>
</body>
</html>
